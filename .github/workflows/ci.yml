name: CI - Lint & Build

on:
  push:
    branches: [ main ]          # ← Change to "master" if your default branch is master
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20          # Next.js 16 works well with Node 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build